<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>ENERGIGAS · Control de Asistencia</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/img/logofondooscuro.ico" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/svg+xml" href="assets/img/logofondoclaro.ico"  media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/x-icon"  href="favicon.ico">
  <style>
    #eg-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #0d1117;
      transition: opacity .45s ease;
    }
    #eg-splash.out { opacity: 0; pointer-events: none; }
    .eg-splash-inner {
      display: flex; flex-direction: column; align-items: center; gap: 36px;
    }
    .eg-logo {
      width: 220px; max-width: 60vw;
      animation: egPulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(79,142,247,.35));
    }
    @keyframes egPulse {
      0%, 100% { opacity: .75; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.05); }
    }
    .eg-track {
      width: 180px; height: 3px;
      background: rgba(255,255,255,.08);
      border-radius: 3px; overflow: hidden;
    }
    .eg-bar {
      height: 100%;
      background: linear-gradient(90deg, #4f8ef7, #a78bfa);
      border-radius: 3px;
      animation: egSlide 1.6s ease-in-out infinite;
    }
    @keyframes egSlide {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 55%;  margin-left: 22%; }
      100% { width: 0%;   margin-left: 100%; }
    }
    .eg-txt {
      font-family: system-ui, sans-serif;
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,.3);
    }
  </style>
</head>
<body>
  <div id="eg-splash">
    <div class="eg-splash-inner">
      <img class="eg-logo" src="assets/img/logofondooscuro.ico" alt="Energigas" />
      <div class="eg-track"><div class="eg-bar"></div></div>
      <span class="eg-txt">Control de Asistencia</span>
    </div>
  </div>
  <app-root></app-root>
</body>
</html>
